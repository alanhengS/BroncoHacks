<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Engagement Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Classroom Engagement Dashboard</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="devices.html">Devices</a></li>
                <li><button id="logoutBtn" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 1em;">Logout</button></li>
            </ul>
        </nav>
    </header>
    <main id="dashboardMain">
        <section id="currentPulse">
            <h2>Current Classroom Pulse</h2>
            <div class="sentiment-display">
                <div class="sentiment-card good">
                    <div class="sentiment-count" id="goodCount">0</div>
                    <div class="sentiment-label">✓ Understand</div>
                    <div class="sentiment-percentage" id="goodPercentage">0%</div>
                </div>
                <div class="sentiment-card bad">
                    <div class="sentiment-count" id="badCount">0</div>
                    <div class="sentiment-label">✗ Lost</div>
                    <div class="sentiment-percentage" id="badPercentage">0%</div>
                </div>
                <div class="sentiment-card question">
                    <div class="sentiment-count" id="questionCount">0</div>
                    <div class="sentiment-label">? Question</div>
                    <div class="sentiment-percentage" id="questionPercentage">0%</div>
                </div>
                <div class="sentiment-card total">
                    <div class="sentiment-count" id="totalCount">0</div>
                    <div class="sentiment-label">Total Responses</div>
                </div>
            </div>
        </section>

        <section id="charts">
            <div class="chart-container">
                <h3>Real-Time Sentiment Distribution</h3>
                <canvas id="sentimentChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Historical Statistics</h3>
                <canvas id="historyChart"></canvas>
            </div>
        </section>

        <section id="history">
            <h2>Recent Activity</h2>
            <div id="activityLog"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 BroncoHacks Engagement System. All rights reserved.</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="dashboard-script.js"></script>
</body>
</html>
